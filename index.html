<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content"
  />
  <meta name="format-detection" content="telephone=no" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#f7f7f7" />

  <title>카카오톡 미니게임</title>

  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div id="root">
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="topbar-left"></div>
          <div class="topbar-title">단어맞추기</div>
          <div class="topbar-right"></div>
        </div>
      </header>

      <main class="layout">
        <section class="play-panel" aria-label="게임 로딩 화면">
          <div class="message">로딩 중...</div>

          <div class="status-row">
            <div class="chip">초기화 중</div>
            <div class="chip">전략 로드 대기</div>
          </div>

          <div class="board" aria-hidden="true">
            <div class="board-row">
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
            </div>
            <div class="board-row">
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
            </div>
            <div class="board-row">
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
            </div>
            <div class="board-row">
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
            </div>
            <div class="board-row">
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
              <div class="tile"></div>
            </div>
          </div>

          <div class="controls">
            <button type="button" class="secondary-btn" disabled>지우기</button>
            <button type="button" class="primary-btn" disabled>입력 제출</button>
            <button type="button" class="primary-btn" disabled>판정 적용</button>
          </div>

          <div class="keyboard" aria-hidden="true">
            <div class="keyboard-row">
              <button type="button" class="key" disabled>ㅂ</button>
              <button type="button" class="key" disabled>ㅈ</button>
              <button type="button" class="key" disabled>ㄷ</button>
              <button type="button" class="key" disabled>ㄱ</button>
              <button type="button" class="key" disabled>ㅅ</button>
              <button type="button" class="key" disabled>ㅛ</button>
              <button type="button" class="key" disabled>ㅕ</button>
              <button type="button" class="key" disabled>ㅑ</button>
              <button type="button" class="key wide" disabled>⌫</button>
            </div>
            <div class="keyboard-row">
              <button type="button" class="key" disabled>ㅁ</button>
              <button type="button" class="key" disabled>ㄴ</button>
              <button type="button" class="key" disabled>ㅇ</button>
              <button type="button" class="key" disabled>ㄹ</button>
              <button type="button" class="key" disabled>ㅎ</button>
              <button type="button" class="key" disabled>ㅗ</button>
              <button type="button" class="key" disabled>ㅓ</button>
              <button type="button" class="key" disabled>ㅏ</button>
              <button type="button" class="key" disabled>ㅣ</button>
            </div>
            <div class="keyboard-row">
              <button type="button" class="key" disabled>ㅋ</button>
              <button type="button" class="key" disabled>ㅌ</button>
              <button type="button" class="key" disabled>ㅊ</button>
              <button type="button" class="key" disabled>ㅍ</button>
              <button type="button" class="key" disabled>ㅠ</button>
              <button type="button" class="key" disabled>ㅜ</button>
              <button type="button" class="key" disabled>ㅡ</button>
              <button type="button" class="key wide" disabled>ENTER</button>
            </div>
          </div>
        </section>

        <aside class="side-panel" aria-label="전략 추천 로딩 화면">
          <h2 class="section-title">전략 추천</h2>

          <div class="panel-block">
            <div class="recommend-main">
              <div class="recommend-word">준비 중</div>
              <div class="recommend-state">앱 초기화 후 추천 패널이 여기에 표시됨.</div>
            </div>
          </div>

          <div class="panel-block">
            <h3 class="section-title" style="margin-top:0;">진행 기록</h3>
            <div class="subtle">아직 입력한 시도가 없음.</div>
          </div>

          <div class="footer-note">
            전략 트리가 있으면 추천이 연결되고, 없으면 기본 플레이만 동작함.
          </div>
        </aside>
      </main>
    </div>
  </div>

  <noscript>
    <div class="error-wrap">
      JavaScript가 비활성화되어 있어 게임을 실행할 수 없음.
    </div>
  </noscript>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
